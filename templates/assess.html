<!-- templates/assess.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Skin Assessment | SkinCare AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>

  <nav class="navbar">
    <span class="logo">🌿 SkinCare AI</span>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/assess">Get Assessment</a>
      <a href="/history">History</a>
    </div>
  </nav>

  <div class="form-page">
    <h2>🧴 Skin Assessment Form</h2>
    <p class="subtitle">Fill in your skin details and our ANN model will recommend a routine for you.</p>

    <form action="/predict" method="POST" class="skin-form">

      <!-- Personal Info -->
      <div class="form-group">
        <label>Your Name</label>
        <input type="text" name="name" placeholder="e.g. Priya Sharma" required/>
      </div>

      <div class="form-group">
        <label>Email Address</label>
        <input type="email" name="email" placeholder="e.g. priya@email.com" required/>
      </div>

      <!-- Skin Questions -->
      <div class="form-row">
        <div class="form-group">
          <label>Skin Type</label>
          <select name="skin_type" required>
            <option value="">-- Select --</option>
            <option value="oily">Oily</option>
            <option value="dry">Dry</option>
            <option value="combination">Combination</option>
            <option value="normal">Normal</option>
            <option value="sensitive">Sensitive</option>
          </select>
        </div>

        <div class="form-group">
          <label>Age Group</label>
          <select name="age_group" required>
            <option value="">-- Select --</option>
            <option value="teen">Teen (13–19)</option>
            <option value="20s">20s</option>
            <option value="30s">30s</option>
            <option value="40s">40s</option>
            <option value="50+">50+</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Skin Sensitivity</label>
          <select name="sensitivity" required>
            <option value="">-- Select --</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>

        <div class="form-group">
          <label>Acne Level</label>
          <select name="acne_level" required>
            <option value="">-- Select --</option>
            <option value="none">None</option>
            <option value="mild">Mild</option>
            <option value="moderate">Moderate</option>
            <option value="severe">Severe</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Skin Dryness</label>
          <select name="dryness" required>
            <option value="">-- Select --</option>
            <option value="none">None</option>
            <option value="mild">Mild</option>
            <option value="moderate">Moderate</option>
            <option value="severe">Severe</option>
          </select>
        </div>

        <div class="form-group">
          <label>Oiliness</label>
          <select name="oiliness" required>
            <option value="">-- Select --</option>
            <option value="none">None</option>
            <option value="mild">Mild</option>
            <option value="moderate">Moderate</option>
            <option value="severe">Severe</option>
          </select>
        </div>
      </div>

      <div class="form-group">
        <label>Sun Exposure Level</label>
        <select name="sun_exposure" required>
          <option value="">-- Select --</option>
          <option value="low">Low (mostly indoors)</option>
          <option value="medium">Medium (some outdoor time)</option>
          <option value="high">High (outdoors most of the day)</option>
        </select>
      </div>

      <button type="submit" class="btn-primary">🔍 Get My Skin Routine</button>

    </form>
  </div>

  <footer>
    <p>Skin Care AI &copy; 2024 — Built with Flask, MongoDB & ANN</p>
  </footer>

</body>
</html>
