<!-- templates/face.html -->
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Face Assessment | SkinCare AI</title>
  <link rel="stylesheet" href="{{ url_for('static', filename='style.css') }}"/>
</head>
<body>

  <nav class="navbar">
    <span class="logo">🌿 SkinCare AI</span>
    <div class="nav-links">
      <a href="/">Home</a>
      <a href="/face">Face Assessment</a>
      <a href="/history">History</a>
    </div>
  </nav>

  <div class="form-page">
    <h2>🧖 Face AI Assessment</h2>
    <p class="subtitle">Describe your face — our ANN gives you a routine, food tips & product suggestions.</p>

    <form action="/face-result" method="POST" class="skin-form">

      <!-- Personal -->
      <div class="form-row">
        <div class="form-group">
          <label>Your Name</label>
          <input type="text" name="name" placeholder="e.g. Priya" required/>
        </div>
        <div class="form-group">
          <label>Email</label>
          <input type="email" name="email" placeholder="e.g. priya@email.com" required/>
        </div>
      </div>

      <div class="section-title">👤 About Your Face</div>

      <div class="form-row">
        <div class="form-group">
          <label>Face Shape</label>
          <select name="face_shape" required>
            <option value="">-- Select --</option>
            <option value="oval">Oval</option>
            <option value="round">Round</option>
            <option value="square">Square</option>
            <option value="heart">Heart</option>
          </select>
        </div>
        <div class="form-group">
          <label>Skin Tone</label>
          <select name="skin_tone" required>
            <option value="">-- Select --</option>
            <option value="fair">Fair</option>
            <option value="medium">Medium</option>
            <option value="dark">Dark</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Dark Circles?</label>
          <select name="dark_circles" required>
            <option value="">-- Select --</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
        </div>
        <div class="form-group">
          <label>Pigmentation / Dark Spots?</label>
          <select name="pigmentation" required>
            <option value="">-- Select --</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Visible Wrinkles / Fine Lines?</label>
          <select name="wrinkles" required>
            <option value="">-- Select --</option>
            <option value="yes">Yes</option>
            <option value="no">No</option>
          </select>
        </div>
        <div class="form-group">
          <label>Skin Type</label>
          <select name="skin_type" required>
            <option value="">-- Select --</option>
            <option value="oily">Oily</option>
            <option value="dry">Dry</option>
            <option value="combination">Combination</option>
            <option value="normal">Normal</option>
            <option value="sensitive">Sensitive</option>
          </select>
        </div>
      </div>

      <div class="section-title">📋 Skin Details (for ANN)</div>

      <div class="form-row">
        <div class="form-group">
          <label>Age Group</label>
          <select name="age_group" required>
            <option value="">-- Select --</option>
            <option value="teen">Teen</option>
            <option value="20s">20s</option>
            <option value="30s">30s</option>
            <option value="40s">40s</option>
            <option value="50+">50+</option>
          </select>
        </div>
        <div class="form-group">
          <label>Sensitivity</label>
          <select name="sensitivity" required>
            <option value="">-- Select --</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Acne Level</label>
          <select name="acne_level" required>
            <option value="">-- Select --</option>
            <option value="none">None</option>
            <option value="mild">Mild</option>
            <option value="moderate">Moderate</option>
            <option value="severe">Severe</option>
          </select>
        </div>
        <div class="form-group">
          <label>Dryness</label>
          <select name="dryness" required>
            <option value="">-- Select --</option>
            <option value="none">None</option>
            <option value="mild">Mild</option>
            <option value="moderate">Moderate</option>
            <option value="severe">Severe</option>
          </select>
        </div>
      </div>

      <div class="form-row">
        <div class="form-group">
          <label>Oiliness</label>
          <select name="oiliness" required>
            <option value="">-- Select --</option>
            <option value="none">None</option>
            <option value="mild">Mild</option>
            <option value="moderate">Moderate</option>
            <option value="severe">Severe</option>
          </select>
        </div>
        <div class="form-group">
          <label>Sun Exposure</label>
          <select name="sun_exposure" required>
            <option value="">-- Select --</option>
            <option value="low">Low</option>
            <option value="medium">Medium</option>
            <option value="high">High</option>
          </select>
        </div>
      </div>

      <button type="submit" class="btn-primary">✨ Get My Full Report</button>

    </form>
  </div>

  <footer><p>Skin Care AI &copy; 2024 — Flask · MongoDB · ANN</p></footer>

</body>
</html>
